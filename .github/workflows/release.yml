name: Release

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: --target universal-apple-darwin
          - os: windows-latest
            args: ''
          - os: ubuntu-22.04
            args: ''
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            file

      - name: Import Apple certificate
        if: matrix.os == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_SIGNING_IDENTITY_SECRET: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm cert.p12

          echo "Available signing identities:"
          security find-identity -v -p codesigning build.keychain

          if [ -n "$APPLE_SIGNING_IDENTITY_SECRET" ]; then
            SIGNING_IDENTITY="$APPLE_SIGNING_IDENTITY_SECRET"
          else
            SIGNING_IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep '"' | head -1 | sed 's/.*"\(.*\)"/\1/')
          fi

          echo "Using signing identity: $SIGNING_IDENTITY"
          echo "APPLE_SIGNING_IDENTITY=$SIGNING_IDENTITY" >> $GITHUB_ENV

      - name: Write Apple API key
        if: matrix.os == 'macos-latest'
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          mkdir -p ~/private_keys
          echo "$APPLE_API_KEY_CONTENT" | base64 --decode > ~/private_keys/AuthKey_${APPLE_API_KEY}.p8

      - name: Build @aster/ui
        run: |
          git clone --depth=1 https://github.com/Aster-Privacy/aster-ui.git ../aster-ui
          cd ../aster-ui
          npm install --no-audit --no-fund
          npm run build

      - name: Install frontend dependencies
        run: npm install --no-audit --no-fund --force

      - name: Build and publish release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ~/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: v__VERSION__
          releaseName: Aster Mail __VERSION__
          releaseDraft: false
          prerelease: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
          tauriScript: npm run tauri

      - name: Rename assets to canonical names
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          V=$(node -p "require('./package.json').version")
          TAG="v${V}"
          TMP=$(mktemp -d)

          rename_asset() {
            local src="$1" dst="$2"
            if gh release download "$TAG" --pattern "$src" --dir "$TMP" --clobber 2>/dev/null; then
              mv "$TMP/$src" "$TMP/$dst"
              gh release upload "$TAG" "$TMP/$dst" --clobber
            fi
          }

          if [[ "${{ matrix.os }}" == "ubuntu-22.04" ]]; then
            rename_asset "Aster.Mail_${V}_amd64.AppImage"     "Aster-Mail-x64.AppImage"
            rename_asset "Aster.Mail_${V}_amd64.AppImage.sig" "Aster-Mail-x64.AppImage.sig"
            rename_asset "Aster.Mail_${V}_amd64.deb"          "Aster-Mail-amd64.deb"
            rename_asset "Aster.Mail_${V}_amd64.deb.sig"      "Aster-Mail-amd64.deb.sig"
            rename_asset "Aster.Mail-${V}-1.x86_64.rpm"       "Aster-Mail-x86_64.rpm"
            rename_asset "Aster.Mail-${V}-1.x86_64.rpm.sig"   "Aster-Mail-x86_64.rpm.sig"
          elif [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            rename_asset "Aster.Mail_${V}_x64-setup.exe"     "Aster-Mail-x64-setup.exe"
            rename_asset "Aster.Mail_${V}_x64-setup.exe.sig" "Aster-Mail-x64-setup.exe.sig"
            rename_asset "Aster.Mail_${V}_x64_en-US.msi"     "Aster-Mail-x64.msi"
            rename_asset "Aster.Mail_${V}_x64_en-US.msi.sig" "Aster-Mail-x64.msi.sig"
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            rename_asset "Aster.Mail_${V}_universal.dmg"             "Aster-Mail-universal.dmg"
            rename_asset "Aster.Mail_${V}_universal.dmg.sig"         "Aster-Mail-universal.dmg.sig"
            rename_asset "Aster.Mail_${V}_universal.app.tar.gz"      "Aster-Mail-universal.app.tar.gz"
            rename_asset "Aster.Mail_${V}_universal.app.tar.gz.sig"  "Aster-Mail-universal.app.tar.gz.sig"
          fi

  update_latest_json:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Rewrite latest.json with canonical asset URLs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V=$(node -p "require('./package.json').version")
          TAG="v${V}"
          TMP=$(mktemp -d)
          gh release download "$TAG" --pattern latest.json --dir "$TMP" --clobber
          sed -i \
            -e "s|Aster\.Mail_${V}_amd64\.AppImage|Aster-Mail-x64.AppImage|g" \
            -e "s|Aster\.Mail_${V}_amd64\.deb|Aster-Mail-amd64.deb|g" \
            -e "s|Aster\.Mail-${V}-1\.x86_64\.rpm|Aster-Mail-x86_64.rpm|g" \
            -e "s|Aster\.Mail_${V}_x64-setup\.exe|Aster-Mail-x64-setup.exe|g" \
            -e "s|Aster\.Mail_${V}_x64_en-US\.msi|Aster-Mail-x64.msi|g" \
            -e "s|Aster\.Mail_${V}_universal\.dmg|Aster-Mail-universal.dmg|g" \
            -e "s|Aster\.Mail_${V}_universal\.app\.tar\.gz|Aster-Mail-universal.app.tar.gz|g" \
            "$TMP/latest.json"
          gh release upload "$TAG" "$TMP/latest.json" --clobber

  ensure_canonical_assets:
    needs: build
    if: always()
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Carry forward any missing canonical installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The marketing site links to releases/latest/download/<canonical name>.
          # If a platform build leg fails (e.g. macOS notarization), its installer
          # is absent and that link 404s. Restore any missing installer from the
          # most recent prior release that has it so the download never breaks.
          V=$(node -p "require('./package.json').version")
          TAG="v${V}"
          ASSETS="Aster-Mail-x64-setup.exe Aster-Mail-x64.msi Aster-Mail-x64.AppImage Aster-Mail-amd64.deb Aster-Mail-x86_64.rpm Aster-Mail-universal.dmg Aster-Mail.apk"
          assets_of() { gh release view "$1" --json assets --jq '.assets[].name' 2>/dev/null; }
          current=$(assets_of "$TAG")
          prior_tags=$(gh release list --limit 40 --json tagName --jq '.[].tagName' | grep -vx "$TAG")
          for a in $ASSETS; do
            if printf '%s\n' "$current" | grep -qx "$a"; then
              continue
            fi
            echo "::warning::$a missing on $TAG; carrying forward from a prior release"
            for pt in $prior_tags; do
              if assets_of "$pt" | grep -qx "$a"; then
                TMP=$(mktemp -d)
                if gh release download "$pt" --pattern "$a" --dir "$TMP" --clobber 2>/dev/null; then
                  gh release upload "$TAG" "$TMP/$a" --clobber
                  echo "Carried forward $a from $pt"
                  break
                fi
              fi
            done
          done

  promote_to_latest:
    needs: [build, update_latest_json, ensure_canonical_assets]
    if: always()
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Promote to Latest only when every download asset is present
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The release is published as a prerelease while it builds, so
          # releases/latest keeps resolving to the last COMPLETE release and the
          # marketing-site download links never 404 mid-build. Only flip it to
          # Latest once every canonical download asset and latest.json exist.
          V=$(node -p "require('./package.json').version")
          TAG="v${V}"
          REQUIRED="Aster-Mail-x64-setup.exe Aster-Mail-x64.msi Aster-Mail-x64.AppImage Aster-Mail-amd64.deb Aster-Mail-x86_64.rpm Aster-Mail-universal.dmg Aster-Mail.apk latest.json"
          have=$(gh release view "$TAG" --json assets --jq '.assets[].name' 2>/dev/null)
          missing=""
          for a in $REQUIRED; do
            printf '%s\n' "$have" | grep -qx "$a" || missing="$missing $a"
          done
          if [ -n "$missing" ]; then
            echo "::error::Refusing to promote $TAG to Latest. Missing:$missing"
            echo "Release stays as prerelease; releases/latest keeps pointing at the last complete release."
            exit 1
          fi
          echo "All required assets present. Promoting $TAG to Latest."
          gh release edit "$TAG" --draft=false --prerelease=false --latest

  publish_winget:
    needs: [build, ensure_canonical_assets, promote_to_latest]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - name: Skip prereleases and drafts
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          status=$(gh release view "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --json isPrerelease,isDraft \
            --jq 'if (.isPrerelease or .isDraft) then "skip" else "publish" end')
          echo "decision=$status" >> "$GITHUB_OUTPUT"
          echo "Release ${GITHUB_REF_NAME} -> $status"

      - name: Compute package version
        id: ver
        if: steps.gate.outputs.decision == 'publish'
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish manifest to winget-pkgs
        if: steps.gate.outputs.decision == 'publish'
        uses: vedantmgoyal9/winget-releaser@4ffc7888bffd451b357355dc214d43bb9f23917e # v2
        with:
          identifier: AsterPrivacy.AsterMail
          version: ${{ steps.ver.outputs.version }}
          release-tag: ${{ github.ref_name }}
          installers-regex: '^Aster-Mail-x64-setup\.exe$'
          fork-user: findleyl
          token: ${{ secrets.WINGET_TOKEN }}
